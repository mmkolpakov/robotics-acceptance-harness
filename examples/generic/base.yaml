---
schema_version: scenario-manifest.v1
scenario_id: generic.empty_world
title: Generic empty world smoke
target_environment: simulation
launch:
  entrypoint: ros2_launch
  package: generic_simulation
  file: empty_world.launch.py
  arguments: []
simulation:
  duration_sec: 30
  headless: true
  physics_engine: gz-physics-dartsim-plugin
expected_ros_graph:
  schema_version: ros-graph-contract.v1
  graph_ready_timeout_sec: 30
  topics:
    - name: /clock
      type: rosgraph_msgs/msg/Clock
      publisher_match:
        min_count: 1
        timeout_sec: 30
      subscriber_match:
        min_count: 0
        timeout_sec: 5
recording:
  enabled: true
  storage: mcap
  topics:
    - /clock
  image_transport:
    policy: on_failure_only
  retention:
    mode: on_failure
    ttl_days: 7
    lifecycle_tag: short
safety:
  execution_guard:
    allow_physical_actuation: false

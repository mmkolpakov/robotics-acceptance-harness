---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
  - repo: https://github.com/rhysd/actionlint.git
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/semgrep/semgrep
    rev: v1.164.0
    hooks:
      - id: semgrep
        name: Enforce attach-only API boundary
        args:
          - scan
          - --config=.semgrep/attach-only.yml
          - --error
          - --metrics=off
          - src/robotics_acceptance_harness
        pass_filenames: false
      - id: semgrep
        name: Test attach-only policy rules
        args: [--test, .semgrep, --metrics=off]
        pass_filenames: false

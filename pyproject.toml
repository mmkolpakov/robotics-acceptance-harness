[build-system]
requires = ["hatchling==1.29.0"]
build-backend = "hatchling.build"

[project]
name = "robotics-simulation-harness"
version = "0.3.0"
description = "pytest plugin: simulation-only execution guard for robotics test suites."
requires-python = ">=3.10"
readme = "README.md"
license = "MIT"
dependencies = [
  "pytest>=8,<10",
]

[project.optional-dependencies]
dev = [
  "pytest==9.0.2",
  "pytest-docker==3.2.5",
  "ruff==0.15.0",
  "yamllint==1.38.0",
]

[project.entry-points.pytest11]
robotics-execution-guard = "robotics_simulation_harness.guard"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

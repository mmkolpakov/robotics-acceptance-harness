---
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Synchronize locked environment
        run: uv sync --locked --all-groups
      - name: Validate release source
        run: |
          uv run pre-commit run --all-files --show-diff-on-failure
          uv run python - <<'PY'
          from importlib.metadata import version
          import os

          assert f"v{version('robotics-acceptance-harness')}" == os.environ["GITHUB_REF_NAME"]
          PY
      - name: Run tests
        run: >-
          uv run pytest
          --robotics-scenario tests/fixtures/simulation.yaml
      - name: Build distributions
        run: uv build --no-sources --out-dir artifacts/dist
      - name: Attest distributions
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: artifacts/dist/*
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/dist/* --generate-notes --verify-tag

---
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Synchronize locked environment
        run: uv sync --locked --all-groups
      - name: Run repository checks
        run: uv run pre-commit run --all-files --show-diff-on-failure
      - name: Run plugin tests
        run: |
          mkdir -p artifacts
          uv run pytest \
            --robotics-scenario tests/fixtures/simulation.yaml \
            --junitxml=artifacts/junit.xml
      - name: Build wheel and source distribution
        run: uv build --out-dir artifacts/dist
      - name: Verify installed wheel
        run: |
          uv venv --python 3.12 .wheel-venv
          uv pip install --python .wheel-venv/bin/python \
            https://github.com/mmkolpakov/robotics-runtime-contracts/releases/download/v0.3.0/robotics_runtime_contracts-0.3.0-py3-none-any.whl \
            artifacts/dist/*.whl
          .wheel-venv/bin/pytest --help | grep -- --robotics-scenario
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: harness-validation-${{ github.sha }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

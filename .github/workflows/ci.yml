---
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install tools
        run: python -m pip install --disable-pip-version-check -e . -r requirements-dev.txt
      - name: Run checks
        env:
          ROBOTICS_CONTRACTS_SCHEMA_DIR: ${{ github.workspace }}/vendor/contracts-schemas
          ROBOTICS_SKIP_ROS_OBSERVER: "1"
        run: make RUN_ID=ci-${GITHUB_RUN_ID} ci
      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0
      - name: Sign CI evidence with Cosign keyless
        run: |
          set -euo pipefail
          mapfile -t evidence_files < <(find runs -type f -name 'evidence-manifest.json' | sort)
          if [[ "${#evidence_files[@]}" -eq 0 ]]; then
            echo "no evidence manifests to sign" >&2
            exit 1
          fi
          SIGNER="https://github.com/${{ github.repository }}/.github/workflows/ci.yml"
          for evidence in "${evidence_files[@]}"; do
            dir="$(dirname "${evidence}")"
            python3 - "${evidence}" "${SIGNER}" <<'PY'
          import json
          import sys
          from pathlib import Path
          path = Path(sys.argv[1])
          data = json.loads(path.read_text(encoding="utf-8"))
          data["signed"] = True
          data["signer_identity"] = sys.argv[2]
          path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY
            cosign sign-blob --yes \
              --bundle "${dir}/evidence-manifest.sigstore.json" \
              --output-signature "${evidence}.sig" \
              --output-certificate "${evidence}.pem" \
              "${evidence}"
            cosign verify-blob \
              --bundle "${dir}/evidence-manifest.sigstore.json" \
              --certificate-identity-regexp \
                "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@.*" \
              --certificate-oidc-issuer \
                "https://token.actions.githubusercontent.com" \
              "${evidence}"
          done
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: harness-runs
          path: runs/
      - name: Notify infra cross-repo gate
        if: >-
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/foundation-ready-v0.2')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "CROSS_REPO_TOKEN missing; skip repository_dispatch"
            exit 0
          fi
          gh api \
            --method POST \
            repos/mmkolpakov/droning-simulation-infra/dispatches \
            -f event_type=harness-ci-success \
            -f client_payload[sha]="${GITHUB_SHA}"
          echo "repository_dispatch harness-ci-success sent"

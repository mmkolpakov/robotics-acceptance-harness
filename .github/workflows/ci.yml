---
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install tools
        run: python -m pip install --disable-pip-version-check -e . -r requirements-dev.txt
      - name: Run checks
        env:
          ROBOTICS_CONTRACTS_SCHEMA_DIR: ${{ github.workspace }}/vendor/contracts-schemas
          ROBOTICS_SKIP_ROS_OBSERVER: "1"
        run: make RUN_ID=ci-${GITHUB_RUN_ID} ci
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: harness-runs
          path: runs/
      - name: Notify infra cross-repo gate
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/foundation-ready-v0.2')
        env:
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          if [[ -z "${CROSS_REPO_TOKEN}" ]]; then
            echo "CROSS_REPO_TOKEN missing; skip repository_dispatch"
            exit 0
          fi
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${CROSS_REPO_TOKEN}" \
            "https://api.github.com/repos/mmkolpakov/droning-simulation-infra/dispatches" \
            -d '{"event_type":"harness-ci-success","client_payload":{"sha":"'"${GITHUB_SHA}"'"}}'
